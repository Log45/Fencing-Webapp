spring.application.name=fencingreferee
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fencing}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging
logging.level.org.hibernate.SQL=DEBUG

# Upload limits
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# S3 / MinIO
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.accessKey=${S3_ACCESS_KEY:backend-user}
s3.secretKey=${S3_SECRET_KEY:backend-secret}
s3.region=us-east-1
s3.bucket=fencing-videos